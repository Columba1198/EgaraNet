# EgaraNet Training & Inference Configuration

# ──────────────────────────────────────────────────────────────────────────────
# Model Architecture
# ──────────────────────────────────────────────────────────────────────────────
model:
  backbone: "facebook/dinov3-vitl16-pretrain-lvd1689m"
  ttb_layers: 3
  ttb_heads: 16
  hidden_dim: 1024
  output_dim: 1024

# ──────────────────────────────────────────────────────────────────────────────
# Image Preprocessing
# ──────────────────────────────────────────────────────────────────────────────
preprocessing:
  max_size: 512
  keep_aspect_ratio: true
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

# ──────────────────────────────────────────────────────────────────────────────
# Training
# ──────────────────────────────────────────────────────────────────────────────
training:
  epochs: 10
  batch_size: 1           # Forced to 1 when keep_aspect_ratio=true
  accumulation_steps: 128
  learning_rate: 5.0e-6
  weight_decay: 1.0e-4
  triplet_margin: 0.2
  bf16: true              # BF16 mixed precision (requires CUDA with BF16 support)
  checkpoint_dir: "./checkpoints"
  num_workers: 4          # DataLoader workers (capped at 4 on Windows)

# ──────────────────────────────────────────────────────────────────────────────
# Inference
# ──────────────────────────────────────────────────────────────────────────────
inference:
  bf16: true
